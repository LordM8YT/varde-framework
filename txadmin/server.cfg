# Generated by the official Varde Framework txAdmin recipe.
# Documentation: https://github.com/LordM8YT/varde-framework

## Server identity. These values are filled by txAdmin during deployment.
sv_hostname "{{serverName}} built with {{recipeName}}"
sets sv_projectName "[{{recipeName}}] {{serverName}}"
sets sv_projectDesc "{{recipeDescription}}"
sets tags "varde, roleplay, enhanced, deployer"
sets locale "en-US"

## Network and Cfx settings.
{{serverEndpoints}}
sv_maxclients {{maxClients}}
sv_licenseKey "{{svLicense}}"
set steam_webApiKey "none"
set resources_useSystemChat true

# Keep this aligned with the current CFX Default recipe until an
# Enhanced-specific game-build recommendation is published.
sv_enforceGameBuild 3258

## Varde requirements and defaults.
set onesync on
set sv_stateBagStrictMode true

# Enhanced early-access testing currently uses developer mode. It can limit
# the server to eight players. Revisit this setting when Cfx publishes the
# public Enhanced artifact requirements.
set sv_devmode true

set varde_maxCharacters 4
set varde_saveIntervalMs 60000

## Standard CFX resources.
ensure mapmanager
ensure chat
ensure spawnmanager
ensure sessionmanager
stop basic-gamemode
ensure hardcap
ensure baseevents

## Varde resources. Keep this order: dependent resources start after core.
ensure varde_core
ensure varde_jobs
ensure varde_inventory
ensure varde_admin
ensure varde_phone
ensure varde_identity
ensure varde_example

## The first txAdmin account is inserted here as a group.admin principal.
add_ace group.admin command allow
add_ace group.admin command.quit deny
add_ace group.admin varde.admin allow
add_ace group.admin varde.jobs.manage allow
{{addPrincipalsMaster}}
